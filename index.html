<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal To-Do List</title>
    <style>
        :root {
            --primary: #f0f8ff; /* Very light blue */
            --secondary: #f5f5f5; /* Light gray */
            --accent: #b0e0e6; /* Powder blue */
            --text: #5a5a5a; /* Darker gray for text */
            --success: #98fb98; /* Pale green */
            --danger: #ffb6c1; /* Light pink */
            --beige: #f5f5dc; /* Light beige */
            --calendar-bg: #e6f7ff; /* Very light blue for calendar */
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
        }
        
        body {
            background-color: var(--primary);
            color: var(--text);
            line-height: 1.6;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        
        header {
            background: var(--accent);
            padding: 25px;
            text-align: center;
        }
        
        h1 {
            font-weight: 500;
            font-size: 2.2rem;
            color: white;
            letter-spacing: -0.5px;
        }
        
        .input-section {
            padding: 25px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .todo-input {
            width: 100%;
            min-height: 120px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            resize: vertical;
            margin-bottom: 20px;
            transition: border-color 0.3s;
            background-color: var(--beige);
        }
        
        .todo-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(176, 224, 230, 0.2);
        }
        
        .mood-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
        }
        
        .mood-btn {
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            transition: transform 0.2s;
            padding: 5px;
            border-radius: 50%;
        }
        
        .mood-btn:hover {
            transform: scale(1.15);
            background: rgba(176, 224, 230, 0.2);
        }
        
        .mood-btn.selected {
            background: rgba(176, 224, 230, 0.4);
            transform: scale(1.1);
        }
        
        .record-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }
        
        .record-btn:hover {
            background: #87ceeb;
        }
        
        .record-btn:active {
            transform: scale(0.98);
        }
        
        .calendar-section {
            padding: 20px;
            background-color: var(--calendar-bg);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .calendar-title {
            font-size: 1.4rem;
            font-weight: 500;
        }
        
        .calendar-nav button {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        
        .calendar-nav button:hover {
            background: rgba(176, 224, 230, 0.2);
        }
        
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        
        .calendar-day {
            text-align: center;
            padding: 8px 0;
            font-weight: bold;
            color: #78909c;
        }
        
        .calendar-date {
            text-align: center;
            padding: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .calendar-date:hover {
            background: rgba(176, 224, 230, 0.3);
        }
        
        .calendar-date.today {
            background: var(--accent);
            color: white;
        }
        
        .calendar-date.has-record {
            background: var(--success);
            color: white;
        }
        
        .calendar-date.selected {
            box-shadow: 0 0 0 2px var(--accent);
        }
        
        .history-section {
            padding: 25px;
        }
        
        .history-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .history-title h2 {
            font-weight: 500;
            font-size: 1.5rem;
        }
        
        .history-list {
            display: grid;
            gap: 20px;
        }
        
        .history-item {
            background: var(--beige);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
        
        .history-date {
            font-size: 0.9rem;
            color: #78909c;
        }
        
        .history-mood {
            font-size: 1.8rem;
        }
        
        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            color: #b0bec5;
            font-size: 1.2rem;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .delete-btn:hover {
            color: var(--danger);
        }
        
        .todo-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 10px;
            padding: 8px 0;
        }
        
        .todo-check {
            margin-right: 12px;
            margin-top: 4px;
            appearance: none;
            width: 22px;
            height: 22px;
            border: 2px solid #b0bec5;
            border-radius: 50%;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .todo-check:checked {
            background: var(--success);
            border-color: var(--success);
        }
        
        .todo-check:checked::after {
            content: '✓';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
        }
        
        .todo-text {
            flex: 1;
            font-size: 1rem;
            transition: color 0.3s;
        }
        
        .todo-check:checked + .todo-text {
            text-decoration: line-through;
            color: #90a4ae;
        }
        
        .empty-history {
            text-align: center;
            padding: 40px 0;
            color: #90a4ae;
            font-style: italic;
        }
        
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            
            .container {
                border-radius: 12px;
            }
            
            header {
                padding: 20px 15px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .input-section, .history-section {
                padding: 20px 15px;
            }
            
            .mood-btn {
                font-size: 1.8rem;
            }
            
            .calendar-date {
                padding: 8px 0;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Minimal To-Do List</h1>
        </header>
        
        <section class="input-section">
            <textarea 
                class="todo-input" 
                placeholder="Add your to-do items here, one per line. Example:&#10;☐ Buy groceries&#10;☐ Finish project"
            ></textarea>
            
            <div class="mood-selector">
                <button class="mood-btn" data-mood="🥳">🥳</button>
                <button class="mood-btn" data-mood="😆">😆</button>
                <button class="mood-btn" data-mood="😭">😭</button>
                <button class="mood-btn" data-mood="😡">😡</button>
                <button class="mood-btn" data-mood="🤡">🤡</button>
            </div>
            
            <button class="record-btn">Record Today's List</button>
        </section>
        
        <section class="calendar-section">
            <div class="calendar-header">
                <div class="calendar-title" id="calendarTitle">June 2023</div>
                <div class="calendar-nav">
                    <button id="prevMonth">&lt;</button>
                    <button id="nextMonth">&gt;</button>
                </div>
            </div>
            
            <div class="calendar-grid">
                <div class="calendar-day">Sun</div>
                <div class="calendar-day">Mon</div>
                <div class="calendar-day">Tue</div>
                <div class="calendar-day">Wed</div>
                <div class="calendar-day">Thu</div>
                <div class="calendar-day">Fri</div>
                <div class="calendar-day">Sat</div>
                <!-- Calendar dates will be populated here -->
            </div>
        </section>
        
        <section class="history-section">
            <div class="history-title">
                <h2>History</h2>
            </div>
            
            <div class="history-list" id="historyList">
                <!-- History items will be added here dynamically -->
            </div>
        </section>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const todoInput = document.querySelector('.todo-input');
            const moodButtons = document.querySelectorAll('.mood-btn');
            const recordBtn = document.querySelector('.record-btn');
            const historyList = document.getElementById('historyList');
            const calendarTitle = document.getElementById('calendarTitle');
            const prevMonthBtn = document.getElementById('prevMonth');
            const nextMonthBtn = document.getElementById('nextMonth');
            const calendarGrid = document.querySelector('.calendar-grid');
            
            let selectedMood = null;
            let currentMonth = new Date().getMonth();
            let currentYear = new Date().getFullYear();
            let selectedDate = null;
            
            // Load history from localStorage
            loadHistory();
            // Render calendar
            renderCalendar(currentMonth, currentYear);
            
            // Mood selection
            moodButtons.forEach(button => {
                button.addEventListener('click', () => {
                    moodButtons.forEach(btn => btn.classList.remove('selected'));
                    button.classList.add('selected');
                    selectedMood = button.dataset.mood;
                });
            });
            
            // Record button functionality
            recordBtn.addEventListener('click', () => {
                const todoText = todoInput.value.trim();
                
                if (!todoText) {
                    alert('Please add some to-do items!');
                    return;
                }
                
                if (!selectedMood) {
                    alert('Please select your mood for today!');
                    return;
                }
                
                // Create history item
                const now = new Date();
                const historyItem = {
                    date: now.toISOString(),
                    dateStr: formatDate(now),
                    mood: selectedMood,
                    todos: todoText.split('\n').filter(line => line.trim() !== '')
                        .map(text => ({ text, completed: false }))
                };
                
                // Save to localStorage
                saveHistoryItem(historyItem);
                
                // Add to UI
                addHistoryItemToUI(historyItem);
                
                // Update calendar
                renderCalendar(currentMonth, currentYear);
                
                // Reset form
                todoInput.value = '';
                moodButtons.forEach(btn => btn.classList.remove('selected'));
                selectedMood = null;
            });
            
            // Calendar navigation
            prevMonthBtn.addEventListener('click', () => {
                currentMonth--;
                if (currentMonth < 0) {
                    currentMonth = 11;
                    currentYear--;
                }
                renderCalendar(currentMonth, currentYear);
            });
            
            nextMonthBtn.addEventListener('click', () => {
                currentMonth++;
                if (currentMonth > 11) {
                    currentMonth = 0;
                    currentYear++;
                }
                renderCalendar(currentMonth, currentYear);
            });
            
            function formatDate(date) {
                return date.toISOString().split('T')[0];
            }
            
            function saveHistoryItem(item) {
                let history = JSON.parse(localStorage.getItem('todoHistory')) || [];
                history.unshift(item); // Add to beginning
                localStorage.setItem('todoHistory', JSON.stringify(history));
            }
            
            function loadHistory() {
                let history = JSON.parse(localStorage.getItem('todoHistory')) || [];
                
                // Migrate old data format if needed
                history = history.map(item => {
                    if (item.todos && item.todos.length > 0 && typeof item.todos[0] === 'string') {
                        return {
                            ...item,
                            todos: item.todos.map(text => ({ text, completed: false }))
                        };
                    }
                    return item;
                });
                
                localStorage.setItem('todoHistory', JSON.stringify(history));
                history.forEach(item => addHistoryItemToUI(item));
            }
            
            function addHistoryItemToUI(item) {
                // Remove empty history message if present
                const emptyMsg = document.querySelector('.empty-history');
                if (emptyMsg) emptyMsg.remove();
                
                const historyItem = document.createElement('div');
                historyItem.className = 'history-item';
                
                const date = new Date(item.date);
                const formattedDate = date.toLocaleString('en-US', {
                    month: 'short',
                    day: 'numeric',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                historyItem.innerHTML = `
                    <div class="history-header">
                        <div class="history-date">${formattedDate}</div>
                        <div class="history-mood">${item.mood}</div>
                    </div>
                    <button class="delete-btn">✕</button>
                    <div class="todos-container">
                        ${item.todos.map(todo => `
                            <div class="todo-item">
                                <input type="checkbox" class="todo-check" ${todo.completed ? 'checked' : ''}>
                                <div class="todo-text">${todo.text.replace(/^☐\s*/, '')}</div>
                            </div>
                        `).join('')}
                    </div>
                `;
                
                // Add delete functionality
                const deleteBtn = historyItem.querySelector('.delete-btn');
                deleteBtn.addEventListener('click', () => {
                    deleteHistoryItem(item.date);
                    historyItem.remove();
                    
                    // Update calendar
                    renderCalendar(currentMonth, currentYear);
                    
                    // Show empty message if no history left
                    if (historyList.children.length === 0) {
                        showEmptyMessage();
                    }
                });
                
                // Add checkbox functionality
                historyItem.querySelectorAll('.todo-check').forEach((checkbox, index) => {
                    checkbox.addEventListener('change', function() {
                        // Update the completed status
                        item.todos[index].completed = this.checked;
                        
                        // Save updated history
                        let history = JSON.parse(localStorage.getItem('todoHistory')) || [];
                        const itemIndex = history.findIndex(i => i.date === item.date);
                        if (itemIndex !== -1) {
                            history[itemIndex] = item;
                            localStorage.setItem('todoHistory', JSON.stringify(history));
                        }
                        
                        // Visual feedback
                        const todoText = this.nextElementSibling;
                        if (this.checked) {
                            todoText.style.color = '#90a4ae';
                            todoText.style.textDecoration = 'line-through';
                        } else {
                            todoText.style.color = '';
                            todoText.style.textDecoration = '';
                        }
                    });
                });
                
                historyList.prepend(historyItem);
            }
            
            function deleteHistoryItem(dateString) {
                let history = JSON.parse(localStorage.getItem('todoHistory')) || [];
                history = history.filter(item => item.date !== dateString);
                localStorage.setItem('todoHistory', JSON.stringify(history));
            }
            
            function showEmptyMessage() {
                const emptyMsg = document.createElement('div');
                emptyMsg.className = 'empty-history';
                emptyMsg.textContent = 'No records yet. Add your first to-do list!';
                historyList.appendChild(emptyMsg);
            }
            
            function renderCalendar(month, year) {
                // Clear existing calendar
                while (calendarGrid.children.length > 7) {
                    calendarGrid.removeChild(calendarGrid.lastChild);
                }
                
                // Set calendar title
                const monthNames = ["January", "February", "March", "April", "May", "June",
                    "July", "August", "September", "October", "November", "December"];
                calendarTitle.textContent = `${monthNames[month]} ${year}`;
                
                // Get first day of month and number of days
                const firstDay = new Date(year, month, 1).getDay();
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                const today = new Date();
                const todayStr = formatDate(today);
                
                // Get records for this month
                const history = JSON.parse(localStorage.getItem('todoHistory')) || [];
                const recordsByDate = {};
                history.forEach(item => {
                    const dateStr = item.dateStr;
                    recordsByDate[dateStr] = (recordsByDate[dateStr] || 0) + 1;
                });
                
                // Add empty cells for days before first day
                for (let i = 0; i < firstDay; i++) {
                    const emptyCell = document.createElement('div');
                    emptyCell.className = 'calendar-date';
                    calendarGrid.appendChild(emptyCell);
                }
                
                // Add date cells
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateCell = document.createElement('div');
                    dateCell.className = 'calendar-date';
                    dateCell.textContent = day;
                    
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    
                    // Highlight today
                    if (dateStr === todayStr) {
                        dateCell.classList.add('today');
                    }
                    
                    // Highlight dates with records
                    if (recordsByDate[dateStr]) {
                        dateCell.classList.add('has-record');
                    }
                    
                    // Add click event
                    dateCell.addEventListener('click', () => {
                        // Remove previous selection
                        document.querySelectorAll('.calendar-date.selected').forEach(el => {
                            el.classList.remove('selected');
                        });
                        
                        // Set new selection
                        dateCell.classList.add('selected');
                        selectedDate = dateStr;
                        
                        // Filter history
                        filterHistoryByDate(dateStr);
                    });
                    
                    calendarGrid.appendChild(dateCell);
                }
            }
            
            function filterHistoryByDate(dateStr) {
                // Clear history list
                while (historyList.firstChild) {
                    historyList.removeChild(historyList.firstChild);
                }
                
                // Get all history items
                const history = JSON.parse(localStorage.getItem('todoHistory')) || [];
                
                // Filter items for selected date
                const filteredItems = history.filter(item => item.dateStr === dateStr);
                
                if (filteredItems.length === 0) {
                    showEmptyMessage();
                } else {
                    filteredItems.forEach(item => addHistoryItemToUI(item));
                }
            }
            
            // Show empty message if no history
            if (historyList.children.length === 0) {
                showEmptyMessage();
            }
        });
    </script>
</body>
</html>
